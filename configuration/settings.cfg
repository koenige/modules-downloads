; Syntax of this configuration file:
; 
; [key]: setting key
; - Field "description": description, just for information.
; - Field "type": type of setting, e. g. mail, number, foreign_key, etc.
; - Field "default": default value
; - Field "db_field": corresponding database field (table.field)
;


[downloads_access_codes_validity_in_hours]
description = "validity of the access code in hours until expiry after first activation"
default = 48
type = int

[downloads_folder]
description = "folder where download files are stored, organised by event identifier"
type = folder
default = %%% setting data_dir %%%/downloads
